name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true

      - name: Restore
        run: dotnet restore AdaptadorGEO.slnx

      - name: Build
        run: dotnet build AdaptadorGEO.slnx -c Release --no-restore

      - name: Test
        run: dotnet test AdaptadorGEO.slnx -c Release --no-build

      - name: Vulnerability scan
        run: dotnet list AdaptadorGEO.slnx package --vulnerable --include-transitive
